<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ein Geschenk für Mama</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #e8487a;
    --purple: #b06bdc;
    --blue: #4a8fe8;
    --mint: #48c8a0;
    --amber: #f0a840;
    --coral: #f06878;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #fff9f5;
    font-family: 'Nunito', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Animated background blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    animation: float 8s ease-in-out infinite;
  }
  .blob1 { width: 320px; height: 320px; background: var(--pink); top: -80px; left: -80px; animation-delay: 0s; }
  .blob2 { width: 280px; height: 280px; background: var(--purple); top: 100px; right: -60px; animation-delay: 2s; }
  .blob3 { width: 240px; height: 240px; background: var(--mint); bottom: 60px; left: -40px; animation-delay: 4s; }
  .blob4 { width: 200px; height: 200px; background: var(--amber); bottom: -40px; right: 40px; animation-delay: 1s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }

  /* Confetti dots scattered */
  .dot {
    position: absolute;
    border-radius: 50%;
    animation: floatDot linear infinite;
    opacity: 0.7;
  }
  @keyframes floatDot {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
    100% { transform: translateY(-120vh) rotate(720deg); opacity: 0; }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 32px;
    border: 2px solid rgba(255,255,255,0.9);
    padding: 44px 36px 40px;
    width: 88%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 8px 48px rgba(180,100,200,0.12), 0 2px 12px rgba(0,0,0,0.06);
  }

  /* Big illustrated graphic */
  .graphic {
    width: 180px;
    height: 180px;
    margin: 0 auto 28px;
    animation: gentleBounce 3s ease-in-out infinite;
  }
  @keyframes gentleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .eyebrow {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 10px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: 36px;
    line-height: 1.2;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .tagline {
    font-size: 15px;
    color: #888;
    line-height: 1.5;
    margin-bottom: 32px;
    font-weight: 600;
  }

  /* CTA Button */
  .btn {
    display: inline-block;
    font-family: 'Pacifico', cursive;
    font-size: 20px;
    color: #fff;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none;
    border-radius: 60px;
    padding: 18px 44px;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 6px 24px rgba(176,107,220,0.4);
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.02em;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .btn:active {
    transform: scale(0.95);
    box-shadow: 0 3px 12px rgba(176,107,220,0.3);
  }

  .btn-arrow {
    display: inline-block;
    margin-left: 8px;
    animation: arrowBounce 1.5s ease-in-out infinite;
  }
  @keyframes arrowBounce {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(5px); }
  }

  /* Stars decoration */
  .stars {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 32px;
  }
  .star {
    position: absolute;
    font-size: 16px;
    animation: twinkle 2s ease-in-out infinite;
    opacity: 0.6;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 0.9; transform: scale(1.2); }
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="blob blob4"></div>

<div class="card">
  <div class="stars" id="stars"></div>

  <!-- Illustrated graphic: birthday cake SVG -->
  <svg class="graphic" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
    <!-- Plate -->
    <ellipse cx="90" cy="148" rx="68" ry="10" fill="#f5d0e8" opacity="0.5"/>
    <!-- Cake base layer -->
    <rect x="28" y="108" width="124" height="40" rx="12" fill="#f9c0d8"/>
    <rect x="28" y="108" width="124" height="14" rx="8" fill="#f4a0c8"/>
    <!-- Frosting drips bottom layer -->
    <path d="M32 108 Q40 98 50 108 Q58 98 68 108 Q76 98 86 108 Q94 98 104 108 Q112 98 122 108 Q130 98 140 108 Q148 98 148 108" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <!-- Cake middle layer -->
    <rect x="40" y="72" width="100" height="38" rx="10" fill="#c8a0f0"/>
    <rect x="40" y="72" width="100" height="13" rx="7" fill="#b880e8"/>
    <!-- Frosting drips middle layer -->
    <path d="M44 72 Q52 62 62 72 Q70 62 80 72 Q88 62 98 72 Q106 62 116 72 Q124 62 132 72 Q136 62 136 72" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <!-- Cake top layer -->
    <rect x="54" y="44" width="72" height="30" rx="9" fill="#80c8f0"/>
    <rect x="54" y="44" width="72" height="11" rx="6" fill="#60b0e8"/>
    <!-- Frosting drips top layer -->
    <path d="M58 44 Q65 36 73 44 Q80 36 90 44 Q98 36 107 44 Q114 36 118 44" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <!-- Candles -->
    <rect x="72" y="22" width="8" height="24" rx="4" fill="#f0a840"/>
    <rect x="90" y="18" width="8" height="28" rx="4" fill="#e8487a"/>
    <rect x="108" y="22" width="8" height="24" rx="4" fill="#48c8a0"/>
    <!-- Flames -->
    <ellipse cx="76" cy="19" rx="5" ry="7" fill="#ffd060" opacity="0.9"/>
    <ellipse cx="76" cy="17" rx="3" ry="4" fill="#fff" opacity="0.6"/>
    <ellipse cx="94" cy="15" rx="5" ry="7" fill="#ffd060" opacity="0.9"/>
    <ellipse cx="94" cy="13" rx="3" ry="4" fill="#fff" opacity="0.6"/>
    <ellipse cx="112" cy="19" rx="5" ry="7" fill="#ffd060" opacity="0.9"/>
    <ellipse cx="112" cy="17" rx="3" ry="4" fill="#fff" opacity="0.6"/>
    <!-- Dots decoration on cake -->
    <circle cx="60" cy="130" r="4" fill="white" opacity="0.6"/>
    <circle cx="80" cy="125" r="3" fill="white" opacity="0.5"/>
    <circle cx="100" cy="130" r="4" fill="white" opacity="0.6"/>
    <circle cx="120" cy="125" r="3" fill="white" opacity="0.5"/>
    <circle cx="140" cy="130" r="4" fill="white" opacity="0.6"/>
    <circle cx="60" cy="88" r="3" fill="white" opacity="0.5"/>
    <circle cx="80" cy="84" r="4" fill="white" opacity="0.6"/>
    <circle cx="100" cy="88" r="3" fill="white" opacity="0.5"/>
    <circle cx="120" cy="84" r="4" fill="white" opacity="0.6"/>
  </svg>

  <div class="eyebrow">Ein besonderes Geschenk</div>
  <h1>Für dich,<br>liebe Mama!</h1>
  <p class="tagline">Drück auf den Knopf und lass<br>dich überraschen ✨</p>

  <a href="birthday.html" class="btn">
    Öffnen <span class="btn-arrow">→</span>
  </a>
</div>

<script>
  // Floating dots background
  const colors = ['#e8487a','#b06bdc','#4a8fe8','#48c8a0','#f0a840','#f06878'];
  const body = document.body;
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    const size = Math.random() * 10 + 5;
    d.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;
      bottom:${Math.random()*20-10}%;
      animation-duration:${Math.random()*8+6}s;
      animation-delay:${Math.random()*6}s;
    `;
    body.appendChild(d);
  }

  // Stars inside card
  const starsEl = document.getElementById('stars');
  const starChars = ['✦','✧','⋆','·'];
  const starColors = ['#e8487a','#b06bdc','#f0a840','#4a8fe8','#48c8a0'];
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = starChars[Math.floor(Math.random()*starChars.length)];
    s.style.cssText = `
      left:${Math.random()*90+5}%;
      top:${Math.random()*90+5}%;
      color:${starColors[Math.floor(Math.random()*starColors.length)]};
      animation-delay:${Math.random()*2}s;
      font-size:${Math.random()*10+10}px;
    `;
    starsEl.appendChild(s);
  }
</script>
</body>
</html>
